name: Adversarial QA

on:
  pull_request:
    paths:
      - 'crates/ga-chatbot/**'
      - 'state/voicings/**'
      - 'tests/adversarial/**'
  push:
    branches:
      - main
    paths:
      - 'crates/ga-chatbot/**'
      - 'state/voicings/**'
      - 'tests/adversarial/**'
  workflow_dispatch:

jobs:
  deterministic:
    name: Deterministic QA (Layers 0-2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-adversarial-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-adversarial-

      - name: Build ga-chatbot
        run: cargo build -p ga-chatbot

      - name: Create output directory
        run: mkdir -p /tmp/adversarial-results

      - name: Run deterministic QA harness
        run: |
          cargo run -p ga-chatbot -- qa \
            --corpus tests/adversarial/corpus/ \
            --fixtures tests/adversarial/fixtures/stub-responses.jsonl \
            --corpus-dir state/voicings/ \
            --output /tmp/adversarial-results/det-results.jsonl

      - name: Upload deterministic results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deterministic-results
          path: /tmp/adversarial-results/det-results.jsonl
          retention-days: 30

  aggregate:
    name: Aggregate verdicts
    runs-on: ubuntu-latest
    needs: deterministic
    steps:
      - uses: actions/checkout@v4

      - name: Download deterministic results
        uses: actions/download-artifact@v4
        with:
          name: deterministic-results
          path: /tmp/adversarial-results

      - name: LLM judge panel not yet wired
        run: |
          echo "::notice::LLM judge panel not yet wired -- deterministic-only results. Octopus dispatch will be added in Phase 3."

      - name: Aggregate and check verdicts
        run: |
          RESULTS="/tmp/adversarial-results/det-results.jsonl"

          if [ ! -f "$RESULTS" ]; then
            echo "::error::Deterministic results file not found"
            exit 1
          fi

          TOTAL=$(wc -l < "$RESULTS")
          F_COUNT=$(grep -c '"deterministic_verdict":"F"' "$RESULTS" || true)
          D_COUNT=$(grep -c '"deterministic_verdict":"D"' "$RESULTS" || true)
          U_COUNT=$(grep -c '"deterministic_verdict":"U"' "$RESULTS" || true)
          C_COUNT=$(grep -c '"deterministic_verdict":"C"' "$RESULTS" || true)

          echo "=== Adversarial QA Aggregate Summary ==="
          echo "Total prompts:  $TOTAL"
          echo "F (False):      $F_COUNT"
          echo "D (Disputed):   $D_COUNT"
          echo "U (Unknown):    $U_COUNT"
          echo "C (Contradict): $C_COUNT"

          # Write summary JSON
          cat > /tmp/adversarial-results/summary.json <<ENDJSON
          {
            "total": $TOTAL,
            "f_count": $F_COUNT,
            "d_count": $D_COUNT,
            "u_count": $U_COUNT,
            "c_count": $C_COUNT,
            "llm_judges_wired": false,
            "pipeline_version": "phase2-deterministic-only"
          }
          ENDJSON

          echo ""
          echo "Summary JSON:"
          cat /tmp/adversarial-results/summary.json

          # Fail if any F/D/U/C verdicts
          FAIL_TOTAL=$((F_COUNT + D_COUNT + U_COUNT + C_COUNT))
          if [ "$FAIL_TOTAL" -gt 0 ]; then
            echo ""
            echo "::error::$FAIL_TOTAL prompt(s) with F/D/U/C verdicts -- QA failed"
            exit 1
          fi

          echo ""
          echo "All prompts passed deterministic checks."

      - name: Upload summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adversarial-qa-summary
          path: /tmp/adversarial-results/summary.json
          retention-days: 30

  unit-tests:
    name: Unit tests (ga-chatbot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-adversarial-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-adversarial-

      - name: Run ga-chatbot tests
        run: cargo test -p ga-chatbot --lib

      - name: Clippy
        run: cargo clippy -p ga-chatbot --tests -- -D warnings
